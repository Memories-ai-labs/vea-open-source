requires-python = ">=3.12"

dependencies = [
    "fastapi==0.115.12",
    "uvicorn[standard]",
    "google-generativeai==0.8.5",
    "google-genai==1.12.1",
    "google-cloud-aiplatform==1.90.0",
    "google-cloud-storage",
